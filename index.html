<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pandavva Archive</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="banner">
  <div class="menu-icon" onclick="toggleSidebar()">☰</div>
  <h1 id="homeBtn">Pandavva Archive</h1>
</header>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search videos...">
</div>

<div class="main-container">

  <!-- Sidebar -->
  <aside id="sidebar"></aside>

  <!-- Konten utama -->
  <main id="mainContent">

    <!-- Home Preview -->
    <section id="homePreview">
      <h2>Upcoming</h2>
      <div class="row" id="upcomingRow"></div>

      <h2>Latest</h2>
      <div class="row" id="latestRow"></div>
    </section>

    <!-- Grid Menu Kategori -->
    <section id="categoryMenu" class="grid-menu"></section>

    <!-- Section Konten Per Kategori / Member -->
    <section id="contentSections"></section>

    <!-- Grid bawah (semua video) -->
    <section id="gridBottom" class="grid-bottom"></section>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
