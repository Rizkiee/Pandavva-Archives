<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pandavva Archive</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="banner">
  <div class="menu-icon" onclick="toggleSidebar()">☰</div>
  <h1 id="homeBtn">Pandavva Archive</h1>
</header>

<!-- Sidebar Overlay -->
<div id="sidebarOverlay"></div>
  <div class="sidebarHeader">
    <span>Channels</span>
    <span class="close-btn" onclick="toggleSidebar()">✕</span>
  </div>
  <div id="sidebarContent"></div>
</aside>

<!-- Home Preview -->
<div id="homeSection">
  <h2 style="margin-left:10px;">Upcoming</h2>
  <div class="row-horizontal" id="row-upcoming"></div>

  <h2 style="margin-left:10px;">Latest</h2>
  <div class="row-horizontal" id="row-latest"></div>

  <!-- Grid menu kategori seperti Grab -->
<div class="grid-menu" id="categoryMenu"></div>
</div>

<!-- Section kategori tampil penuh saat tombol grid ditekan -->
<div id="categorySection" class="hidden"></div>

<script src="script.js"></script>
</body>
</html>
